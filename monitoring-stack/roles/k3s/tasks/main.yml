---
# tasks file for roles/k3s

- name: Download and install K3s
  become: yes
  shell: "curl -sfL {{ k3s_install_script_url }} | INSTALL_K3S_VERSION='{{ k3s_version }}' sh -s - --write-kubeconfig-mode 644"
  args:
    creates: /usr/local/bin/k3s

- name: Create .kube directory for {{ k3s_user }}
  file:
    path: "/home/{{ k3s_user }}/.kube"
    state: directory
    owner: "{{ k3s_user }}"
    group: "{{ k3s_user }}"
    mode: '0700'

- name: Copy kubeconfig to user's home
  become: yes
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ k3s_user }}/.kube/config"
    remote_src: yes
    owner: "{{ k3s_user }}"
    group: "{{ k3s_user }}"
    mode: '0600'

- name: Ensure K3s service is started and enabled
  become: yes
  systemd:
    name: k3s
    state: started
    enabled: yes
